{% extends "index.html" %}
{% block content %}

<div class="login-container">
    <div class="login-box">
        
        <h2 class="login-title">
            <i class="bi bi-box-arrow-in-right login-icon"></i>Log In
        </h2>
        <p class="login-subtitle">Welcome back to CS50 Buddy Matcher.</p>

        <form action="/login" method="post" class="login-form">
            
            <div class="form-group">
                {% if error %}
                    <div id="error-alert" class="error-alert">
                        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
                    </div>
                {% endif %}
                <label class="form-label" for="github">GitHub Username</label>
                <div class="input-wrapper">
                    <span class="input-icon"><i class="bi bi-github"></i></span>
                    <input class="form-input" type="text" id="github" name="github" autocomplete="username" autofocus required />
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" required />
            </div>
            
            <button class="btn-submit" type="submit">Log In</button>
            
        </form>

        <p class="register-text">
            New here? <a href="/register" class="register-link">Create an account</a>
        </p>
        
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Find the error alert box
        const errorAlert = document.getElementById('error-alert');
        
        if (errorAlert) {
            // If the error exists, wait for 4 seconds (4000 milliseconds)
            setTimeout(() => {
                // Make it transparent and move it up slightly
                errorAlert.style.opacity = '0';
                errorAlert.style.transform = 'translateY(-10px)';
                
                // Remove the element from the DOM after the transition ends (500ms)
                setTimeout(() => errorAlert.remove(), 500); 
            }, 4000);
        }
    });
</script>
{% endblock %}
